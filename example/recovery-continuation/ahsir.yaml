agents:
  - name: teacher
    workspace: example/recovery-continuation/workspaces/teacher
    port: 0

registry:
  host: "127.0.0.1"
  port: 9800
  heartbeat_interval: 10s
  heartbeat_timeout: 30s

timeouts:
  # Use no scheduler/CLI chat deadline for this walkthrough so an intentionally
  # long provider turn can be interrupted by killing the agent process.
  chat: 0s
  task_status: 30s

port_range:
  start: 9801
  end: 9810
