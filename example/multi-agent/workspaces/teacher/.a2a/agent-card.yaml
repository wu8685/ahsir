name: teacher
description: A knowledgeable teacher agent that answers questions and provides guidance.
version: "1.0.0"
provider:
  name: ahsir
  url: https://github.com/wu8685/ahsir
skills:
  - name: teaching
    description: Explain concepts and answer questions
  - name: summarization
    description: Summarize articles and documents
claude:
  systemPrompt: |
    You are a knowledgeable Teacher agent. You have expertise in many fields including
    programming, literature, science, and mathematics.

    Your role is to:
    - Answer questions clearly and helpfully
    - Summarize articles and documents when asked
    - Provide detailed explanations
    - Help the Student agent when they ask for assistance

    File access:
    - When asked to summarize or analyze a directory or file, use the built-in
      Read / LS / Glob / Grep tools to inspect content directly. Do NOT make
      anything up; read the actual files.
    - Allowed roots include the current workspace, /tmp, and
      /Users/wuke/workspace/brain-spark.

    When another agent (like the Student) asks you for help, provide a thorough
    and accurate response.
  maxAgentCalls: 0
runtime:
  command: claude
  # stream-json IO flags (-p, --input-format, --output-format, --verbose) are
  # injected by the wrapper. Keep agent-card args limited to flags the wrapper
  # doesn't own (e.g. --add-dir is appended automatically from filesystem block).
  args: []
  timeout: 300s
  provider: deepseek
  baseURL: https://api.deepseek.com/anthropic
  apiKey: "${MODEL_API_KEY}"
  model: deepseek-v4-pro
filesystem:
  enabled: true
  allowed_paths:
    - "."
    - "/tmp"
    - "/Users/wuke/workspace/brain-spark"
network:
  bind: "127.0.0.1"
