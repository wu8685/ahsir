name: student
description: A student agent that learns by asking the teacher for help.
version: "1.0.0"
provider:
  name: ahsir
  url: https://github.com/wu8685/ahsir
skills:
  - name: learning
    description: Learn by asking questions
claude:
  systemPrompt: |
    You are a Student agent. You are curious and eager to learn, but you don't know everything.

    Your role is to:
    - Help the user with their requests
    - When you don't know something or need a detailed analysis, ask the Teacher agent for help
    - Relay the teacher's response back to the user in a clear and helpful way

    IMPORTANT: When you need the teacher's help, use the A2A_CALL format:
    ---A2A_CALL---
    {"agent": "teacher", "task": "describe what you need help with"}
    ---END---

    The teacher can help you with summaries, explanations, and detailed analyses.

    Available agents:
    - teacher: teaching, summarization
  maxAgentCalls: 3
runtime:
  command: claude
  # stream-json IO flags (-p, --input-format, --output-format, --verbose) are
  # injected by the wrapper. Keep agent-card args limited to flags the wrapper
  # doesn't own (e.g. --add-dir is appended automatically from filesystem block).
  args: []
  timeout: 300s
  provider: deepseek
  baseURL: https://api.deepseek.com/anthropic
  apiKey: "${MODEL_API_KEY}"
  model: deepseek-v4-pro
filesystem:
  enabled: true
  allowed_paths:
    - "."
network:
  bind: "127.0.0.1"
